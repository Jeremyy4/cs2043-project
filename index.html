<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saint John ER Pre-Triage</title>
<style>
  :root {
    --red:    #C0392B;
    --orange: #E67E22;
    --yellow: #F1C40F;
    --green:  #27AE60;
    --blue:   #2980B9;
    --bg:     #F7F9FC;
    --card:   #FFFFFF;
    --text:   #1A2332;
    --muted:  #6B7A90;
    --border: #DDE3EC;
    --accent: #1A4A7A;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: white;
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  header .cross {
    width: 38px; height: 38px;
    background: white;
    border-radius: 6px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  header .cross span {
    font-size: 22px; line-height: 1;
  }
  header h1 { font-size: 18px; font-weight: 700; line-height: 1.2; }
  header p  { font-size: 12px; opacity: .75; margin-top: 2px; }

  /* ── API Key banner ── */
  #api-banner {
    background: #FFF8E1;
    border-bottom: 2px solid #FFD54F;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #api-banner label { font-size: 13px; font-weight: 600; color: #5D4037; white-space: nowrap; }
  #api-key-input {
    flex: 1; min-width: 220px;
    border: 1px solid #FFD54F;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: monospace;
    background: white;
    color: var(--text);
  }
  #api-key-input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  #save-key-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #api-status { font-size: 12px; color: #27AE60; font-weight: 600; display: none; }

  /* ── Main ── */
  main { max-width: 560px; margin: 0 auto; padding: 24px 16px 0; }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 24px 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Form fields ── */
  .field { margin-bottom: 16px; }
  label.field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  label.field-label .req { color: var(--red); margin-left: 2px; }
  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: white;
    transition: border-color .15s, box-shadow .15s;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,74,122,.12);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* ── Range slider ── */
  .range-wrap { display: flex; align-items: center; gap: 12px; }
  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    height: 4px;
    border: none;
    padding: 0;
    box-shadow: none;
    background: transparent;
  }
  .range-val {
    min-width: 32px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
  }

  /* ── ER radio ── */
  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-card {
    flex: 1; min-width: 140px;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .radio-card input { margin-top: 3px; accent-color: var(--accent); }
  .radio-card.selected {
    border-color: var(--accent);
    background: rgba(26,74,122,.05);
  }
  .radio-card strong { font-size: 13px; display: block; }
  .radio-card span   { font-size: 11px; color: var(--muted); }

  /* ── Submit ── */
  #submit-btn {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .02em;
    transition: opacity .15s, transform .1s;
    margin-top: 4px;
  }
  #submit-btn:hover:not(:disabled) { opacity: .9; }
  #submit-btn:active:not(:disabled) { transform: scale(.98); }
  #submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Spinner ── */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 3px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Result card ── */
  #result { display: none; }
  .ctas-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border-radius: 8px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 22px;
    margin-bottom: 16px;
    color: white;
  }
  .ctas-badge small { font-size: 13px; font-weight: 600; display: block; opacity: .9; }

  .result-section { margin-top: 16px; }
  .result-section h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
  .result-section p  { font-size: 14px; line-height: 1.6; }

  .red-flags { list-style: none; }
  .red-flags li {
    font-size: 14px;
    padding: 6px 10px;
    background: #FFF0F0;
    border-left: 3px solid var(--red);
    border-radius: 0 6px 6px 0;
    margin-bottom: 6px;
  }
  .red-flags li::before { content: "🚩 "; }

  .new-btn {
    margin-top: 20px;
    width: 100%;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .new-btn:hover { background: var(--accent); color: white; }

  /* ── Error ── */
  .error-msg {
    background: #FFF0F0;
    border: 1px solid #FFCDD2;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
    display: none;
  }

  /* ── CTAS legend ── */
  .legend { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="cross"><span>🏥</span></div>
  <div>
    <h1>Saint John ER Pre-Triage</h1>
    <p>AI-assisted CTAS assessment · For demonstration only</p>
  </div>
</header>

<!-- API Key Banner -->
<div id="api-banner">
  <label for="api-key-input">🔑 Anthropic API Key</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off">
  <button id="save-key-btn" onclick="saveKey()">Save</button>
  <span id="api-status">✓ Key saved</span>
</div>

<main>

  <!-- CTAS Legend -->
  <div class="card" style="padding:14px 20px;">
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;">CTAS PRIORITY SCALE</div>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#C0392B"></div> 1 · Resuscitation</div>
      <div class="legend-item"><div class="dot" style="background:#E67E22"></div> 2 · Emergent</div>
      <div class="legend-item"><div class="dot" style="background:#D4AC0D"></div> 3 · Urgent</div>
      <div class="legend-item"><div class="dot" style="background:#27AE60"></div> 4 · Less Urgent</div>
      <div class="legend-item"><div class="dot" style="background:#2980B9"></div> 5 · Non-Urgent</div>
    </div>
  </div>

  <!-- Form -->
  <div id="form-section">
    <div class="card">
      <div class="card-title">Patient Information</div>

      <div class="field">
        <label class="field-label" for="name">Full Name <span class="req">*</span></label>
        <input type="text" id="name" placeholder="e.g. Jane Smith">
      </div>

      <div style="display:flex;gap:12px;">
        <div class="field" style="flex:1">
          <label class="field-label" for="age">Age <span class="req">*</span></label>
          <input type="number" id="age" min="0" max="120" placeholder="30">
        </div>
        <div class="field" style="flex:1">
          <label class="field-label" for="sex">Sex <span class="req">*</span></label>
          <select id="sex">
            <option value="">Select…</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Pain Level <span class="req">*</span></label>
        <div class="range-wrap">
          <span style="font-size:12px;color:var(--muted)">1</span>
          <input type="range" id="pain" min="1" max="10" value="5" oninput="document.getElementById('pain-val').textContent=this.value">
          <span style="font-size:12px;color:var(--muted)">10</span>
          <div class="range-val" id="pain-val">5</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Symptoms</div>

      <div class="field">
        <label class="field-label" for="symptom">Chief Complaint <span class="req">*</span></label>
        <textarea id="symptom" placeholder="Describe the main symptom or reason for visit…"></textarea>
      </div>

      <div class="field">
        <label class="field-label" for="duration">Duration <span class="req">*</span></label>
        <input type="text" id="duration" placeholder="e.g. 2 hours, since yesterday morning">
      </div>

      <div class="field">
        <label class="field-label" for="history">Medical History <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <textarea id="history" placeholder="e.g. hypertension, diabetes, allergies…" style="min-height:60px"></textarea>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button id="submit-btn" onclick="submitForm()">🤖 Submit for CTAS Assessment</button>
  </div>

  <!-- Result -->
  <div class="card" id="result">
    <div id="ctas-badge-wrap"></div>

    <div class="result-section">
      <h4>📋 Clinical Summary</h4>
      <p id="result-summary"></p>
    </div>

    <div class="result-section" id="flags-section" style="display:none">
      <h4>🚩 Red Flags</h4>
      <ul class="red-flags" id="result-flags"></ul>
    </div>

    <div class="result-section">
    </div>

    <button class="new-btn" onclick="resetForm()">← New Patient Check-In</button>
  </div>

</main>

<script>
// ── API Key ──────────────────────────────────────────────
function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) return;
  sessionStorage.setItem('anthro_key', k);
  document.getElementById('api-status').style.display = 'inline';
  setTimeout(() => document.getElementById('api-status').style.display = 'none', 2000);
}
window.onload = () => {
  const saved = sessionStorage.getItem('anthro_key');
  if (saved) {
    document.getElementById('api-key-input').value = saved;
    document.getElementById('api-status').style.display = 'inline';
    setTimeout(() => document.getElementById('api-status').style.display = 'none', 1500);
  }
};

// ── ER radio ─────────────────────────────────────────────
function selectER(el) {
  el.closest('.radio-card').classList.add('selected');
}

// ── CTAS colors ───────────────────────────────────────────
const CTAS_COLORS = { 1:'#C0392B', 2:'#E67E22', 3:'#D4AC0D', 4:'#27AE60', 5:'#2980B9' };
const CTAS_LABELS = { 1:'Resuscitation', 2:'Emergent', 3:'Urgent', 4:'Less Urgent', 5:'Non-Urgent' };

// ── Show error ────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearError() {
  document.getElementById('error-msg').style.display = 'none';
}

// ── Submit ────────────────────────────────────────────────
async function submitForm() {
  clearError();
  const apiKey  = sessionStorage.getItem('anthro_key') || document.getElementById('api-key-input').value.trim();
  const name    = document.getElementById('name').value.trim();
  const age     = document.getElementById('age').value.trim();
  const sex     = document.getElementById('sex').value;
  const pain    = document.getElementById('pain').value;
  const symptom = document.getElementById('symptom').value.trim();
  const duration= document.getElementById('duration').value.trim();
  const history = document.getElementById('history').value.trim() || 'None reported';
  const er      = 'ER1'; // assigned by staff

  if (!apiKey)   return showError('❌ Please enter your Anthropic API key above.');
  if (!name)     return showError('❌ Please enter the patient name.');
  if (!age)      return showError('❌ Please enter the patient age.');
  if (!sex)      return showError('❌ Please select sex.');
  if (!symptom)  return showError('❌ Please describe the chief complaint.');
  if (!duration) return showError('❌ Please enter symptom duration.');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Assessing with Claude…';

  const systemPrompt = `You are a Canadian Triage and Acuity Scale (CTAS) triage assistant.
Given a patient's intake information, assign a CTAS level from 1 (most critical) to 5 (least urgent).

CTAS Reference:
- Level 1: Immediate life threat — cardiac arrest, severe respiratory distress, unconscious
- Level 2: High risk — chest pain, stroke symptoms, severe trauma, altered consciousness
- Level 3: Moderate risk — moderate pain, stable vitals but needs workup soon
- Level 4: Low risk — minor pain, non-acute complaints
- Level 5: Minimal risk — chronic minor issues

Return ONLY valid JSON, no markdown:
{"ctas_level": <1-5>, "clinical_summary": "<one paragraph>", "red_flags": ["<flag>"]}`;

  const userMsg = `Patient intake:
- Name: ${name}
- Age: ${age}, Sex: ${sex}
- Chief Symptom: ${symptom}
- Pain Level: ${pain}/10
- Duration: ${duration}
- Medical History: ${history}
- ER: ${er}
Return CTAS JSON.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':            'application/json',
        'x-api-key':               apiKey,
        'anthropic-version':       '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model:      'claude-sonnet-4-6',
        max_tokens: 600,
        system:     systemPrompt,
        messages:   [{ role: 'user', content: userMsg }],
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    let raw = data.content[0].text.trim();
    if (raw.startsWith('```')) {
      raw = raw.replace(/```json?/g, '').replace(/```/g, '').trim();
    }
    const result = JSON.parse(raw);
    showResult(result, name, age, sex, er);

  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '🤖 Submit for CTAS Assessment';
    showError(`❌ Error: ${e.message}`);
  }
}

// ── Show result ───────────────────────────────────────────
function showResult(result, name, age, sex, er) {
  const level = result.ctas_level;
  const color = CTAS_COLORS[level];
  const label = CTAS_LABELS[level];

  document.getElementById('form-section').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';

  document.getElementById('ctas-badge-wrap').innerHTML = `
    <div style="margin-bottom:6px;font-size:13px;font-weight:600;color:var(--muted)">Patient: ${name}, ${age} y/o ${sex}</div>
    <div class="ctas-badge" style="background:${color}">
      <span style="font-size:32px">${['🔴','🟠','🟡','🟢','🔵'][level-1]}</span>
      <div>
        CTAS ${level}
        <small>${label}</small>
      </div>
    </div>`;

  document.getElementById('result-summary').textContent = result.clinical_summary;

  const flagsSection = document.getElementById('flags-section');
  const flagsList    = document.getElementById('result-flags');
  flagsList.innerHTML = '';
  if (result.red_flags && result.red_flags.length > 0) {
    result.red_flags.forEach(f => {
      const li = document.createElement('li');
      li.textContent = f;
      flagsList.appendChild(li);
    });
    flagsSection.style.display = 'block';
  } else {
    flagsSection.style.display = 'none';
  }


  resultEl.scrollIntoView({ behavior: 'smooth' });
}

// ── Reset ─────────────────────────────────────────────────
function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('name').value = '';
  document.getElementById('age').value = '';
  document.getElementById('sex').value = '';
  document.getElementById('pain').value = 5;
  document.getElementById('pain-val').textContent = 5;
  document.getElementById('symptom').value = '';
  document.getElementById('duration').value = '';
  document.getElementById('history').value = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').innerHTML = '🤖 Submit for CTAS Assessment';
  clearError();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
